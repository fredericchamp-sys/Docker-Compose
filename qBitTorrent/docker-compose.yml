name: torrent

services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8066
      - TORRENTING_PORT=9854

    volumes:
      - C:\docker\qbittorrent\config:/config
      - C:\docker\qbittorrent\torrents:/downloads

    ports:
      - "8066:8066"
      - "9854:9854/tcp"
      - "9854:9854/udp"

    networks:
      - synobridge

    restart: unless-stopped

networks:
  synobridge:
    external: true