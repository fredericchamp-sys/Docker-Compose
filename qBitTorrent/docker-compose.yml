name: torrent

services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent

    environment:
      - PUID=1234
      - PGID=65432
      - TZ=Europe/Paris
      - WEBUI_PORT=8090
      - TORRENTING_PORT=9854

    volumes:
      - C:\docker\qbittorrent\config:/config
      - C:\docker\qbittorrent\torrents:/data/torrents

    ports:
      - "8090:8090"
      - "9854:9854/tcp"
      - "9854:9854/udp"

    networks:
      - synobridge

    restart: unless-stopped

networks:
  synobridge:
    external: true