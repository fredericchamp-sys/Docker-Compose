global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'patroni'
    static_configs:
      - targets:
          - 'pg-primary:8008'
          - 'pg-replica:8008'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'postgres_exporter'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'

  - job_name: 'haproxy'
    static_configs:
      - targets:
          - 'haproxy:8404'