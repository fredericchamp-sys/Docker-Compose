global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'patroni'
    static_configs:
      - targets:
          - '172.21.0.21:8008'   # poc01 RW
          - '172.21.0.22:8008'   # poc02 DR
          - '172.21.0.23:8008'   # poc03 RO
          - '172.21.0.24:8008'   # poc04 LR
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'postgres_exporter'
    static_configs:
      - targets:
          - '172.24.0.21:9187'
          - '172.24.0.22:9187'
          - '172.24.0.23:9187'
          - '172.24.0.24:9187'

  - job_name: 'haproxy'
    static_configs:
      - targets:
          - '172.21.0.100:8404'
          - '172.21.0.101:8404'
          - '172.21.0.102:8404'
          - '172.21.0.103:8404'
