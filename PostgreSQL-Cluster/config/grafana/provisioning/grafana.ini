[server]
http_port = 3000

[security]
admin_user = admin
# admin_password set via GF_SECURITY_ADMIN_PASSWORD env var in compose

[users]
allow_sign_up = false

[auth.anonymous]
enabled = false

[log]
mode = console
level = info

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards

[alerting]
enabled = true

[unified_alerting]
enabled = false
