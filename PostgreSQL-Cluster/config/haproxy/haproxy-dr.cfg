# haproxy-dr.cfg – DR cluster
global
    log stdout format raw local0
    maxconn 2048
    daemon
defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

frontend fe_dr_rw
    bind *:6432
    default_backend be_dr_rw

backend be_dr_rw
    option httpchk GET /primary HTTP/1.0\r\nHost:\ patroni
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server poc02-pgbouncer 172.20.0.32:5432 check port 8008 addr 172.21.0.22

backend postgres_write
  option httpchk GET /primary
  server pg-primary pg-primary:8008 check

backend postgres_read
  option httpchk GET /replica
  server pg-replica pg-replica:8008 check

listen stats
    bind 127.0.0.1:8080
    stats enable
    stats uri /haproxy-stats
    stats auth admin:changeme_stats
