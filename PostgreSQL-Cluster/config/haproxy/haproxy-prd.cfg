global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect  5s
    timeout client   30s
    timeout server   30s
    retries 3

# RW frontend - port 6432 - routes to primary only
frontend fe_rw
    bind *:6432
    default_backend be_rw

backend be_rw
    option  httpchk
    http-check send meth GET uri /primary ver HTTP/1.0
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-primary pg-primary:8008 check

# RO frontend - port 6433 - routes to replica
# Uses /health so it stays UP even while replica is still syncing
frontend fe_ro
    bind *:6433
    default_backend be_ro

backend be_ro
    balance leastconn
    option  httpchk
    http-check send meth GET uri /health ver HTTP/1.0
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-primary  pg-primary:8008  check backup
    server pg-replica  pg-replica:8008  check

listen stats
    bind *:8080
    stats enable
    stats uri /haproxy-stats
    stats auth admin:admin
