name: kms

services:

  # =====================
  # VAULT  (Production – Raft storage, TLS enabled)
  # =====================

  vault:
    build: .
    image: pg-vault
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK          # prevents secrets from being swapped to disk
    volumes:
      - ${DATA_DIR}/data:/vault/data
      - ${DATA_DIR}/logs:/vault/logs
      - ./secrets/vault-tls:/vault/tls:ro
    environment:
      VAULT_ADDR: https://vault:8200
      VAULT_API_ADDR: https://vault:8200
      VAULT_CLUSTER_ADDR: https://vault:8201
    ports:
      - "8200:8200"
      - "8201:8201"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=https://vault:8200 -tls-skip-verify || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

secrets:
  vault-ca:
    file: ./secrets/vault-tls/vault.crt   # generated by vault-tls-gen.sh
